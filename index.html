<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Elizabeth</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --rosa-fuerte: #f06292;
            --rosa-sutil: rgba(255, 240, 245, 0.85); /* Rosa traslúcido muy fino */
            --plata: #C0C0C0;
            --texto: #4a4a4a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background-image: url('image_83f399.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            max-width: 500px;
            width: 85%;
            margin: 60px 0;
            position: relative;
            padding: 70px 0 60px 0;
            text-align: center;
            border-radius: 10px;
            background-image: url('fondo_texto.jpg'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid var(--plata);
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            margin: 10px 0;
            background: linear-gradient(to right, #f06292 20%, #C0C0C0 40%, #ffffff 50%, #C0C0C0 60%, #f06292 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* --- DETALLE FINO PARA LOS PADRES --- */
        .parents-highlight {
            display: inline-block; /* Hace que el fondo solo ocupe el ancho del texto */
            margin-top: 50px;
            padding: 15px 40px;
            position: relative;
            z-index: 5;
        }

        /* Fondo sutil tipo cinta o pincelada */
        .parents-highlight::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--rosa-sutil);
            /* Textura de fibra de papel muy fina */
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            border-radius: 50px 10px 50px 10px; /* Bordes irregulares elegantes */
            transform: skewX(-5deg); /* Le da un toque más artístico */
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.1);
            border: 1px solid rgba(192, 192, 192, 0.3);
            z-index: -1;
        }

        .parents-highlight p {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #777;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .parents-highlight strong {
            color: var(--rosa-fuerte);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Estilo para los botones de mapa y música se mantienen igual */
        .btn-mapa {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--rosa-fuerte);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.4);
        }

        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            background: white;
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 2px solid var(--rosa-fuerte);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
        <span style="font-size: 0.7rem; font-weight: bold; color: var(--rosa-fuerte);">MÚSICA</span>
    </div>

    <div class="card animate__animated animate__fadeIn">
        <div style="padding: 0 30px;">
            <p style="font-family:'Cinzel'; letter-spacing:4px; color:var(--texto); font-weight:700;">MIS XV AÑOS</p>
            <h1 class="name">Elizabeth</h1>
            <p style="font-family:'Great Vibes'; font-size:2.2rem; color:var(--rosa-fuerte); margin-top:-10px;">García Huchin</p>

            <!-- Secciones de ceremonia y recepción omitidas en este resumen por brevedad, pero mantenlas en tu archivo final -->
            <div class="animate__animated animate__fadeInUp">
                <h3>CEREMONIA RELIGIOSA</h3>
                <p style="color:var(--texto); font-size: 0.9rem;"><strong>3:30 PM</strong><br>TEMPLO JORDAN</p>
                <a href="#" class="btn-mapa">📍 UBICACIÓN</a>
            </div>
        </div>

        <!-- EL RESALTADO SUTIL PARA LOS PADRES -->
        <div class="parents-highlight animate__animated animate__fadeInUp" style="animation-delay: 0.6s;">
            <p>Con la bendición de Dios y de mis padres:</p>
            <strong>CELERINO GARCÍA & LILIANA HUCHIN</strong>
        </div>
    </div>

    <script>
        const music = document.getElementById("bgMusic");
        const musicIcon = document.getElementById("music-icon");
        function toggleMusic() {
            if (music.paused) { music.play(); musicIcon.innerHTML = "⏸️"; } 
            else { music.pause(); musicIcon.innerHTML = "🎵"; }
        }
        document.addEventListener('click', () => {
            if(music.paused) { music.play(); musicIcon.innerHTML = "⏸️"; }
        }, { once: true });
    </script>
</body>
</html>
